app:
  admin_token: "change-me"

server:
  listen: "127.0.0.1:8088"

napcat:
  endpoint: "http://127.0.0.1:3000"
  token: "change-me"
  timeout_seconds: 30
  max_concurrent_requests: 8
  retry_max_attempts: 3

bot:
  admins:
    - 123456789
  allowed_groups:
    - 11111111111

website:
  allowed_hosts:
    - "you_url"
  max_file_size_mb: 2048
  user_agent: "NapCatFileMover/0.1"

database:
  driver: "sqlite"
  path: ""
  dsn: ""

redis:
  enabled: false
  addr: "127.0.0.1:6379"
  password: ""
  db: 0
  stream: "mover:tasks"
  consumer_group: "mover-workers"
  consumer_name: "mover-1"

storage:
  type: "local"
  local_root: ""
  s3:
    endpoint: ""
    bucket: ""
    region: "us-east-1"
    access_key: ""
    secret_key: ""
    use_path_style: true
    prefix: "archive/"

worker:
  download_workers: 16
  upload_workers: 4
  max_active_tasks: 32
  buffer_size_kb: 512
  max_retries: 5

rate_limit:
  qq_api_rps: 2
  group_upload_rpm: 6
  per_host_downloads: 4
  global_downloads: 16

search:
  embedding_endpoint: ""
  high_confidence: 0.72
  max_batch_files: 50
  max_batch_size_mb: 2048
  semantic:
    enabled: false
    provider: "ollama"
    endpoint: "http://127.0.0.1:11434"
    model: "bge-m3"
    batch_size: 16
    timeout_seconds: 30

reload:
  enabled: true
  debounce_ms: 500
